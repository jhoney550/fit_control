<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FitControl - Login</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="auth-body">
  <main class="auth-card">
    <div class="brand">
      <div class="brand-icon">FC</div>
      <div>
        <h1>FitControl</h1>
        <p>Gestão de treinos para professores e alunos</p>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-profile="professor">Sou Professor</button>
      <button class="tab" data-profile="aluno">Sou Aluno</button>
    </div>

    <section>
      <div class="profile-heading">
        <strong id="loginTitulo">Login do Professor</strong>
        <span id="loginSubtitulo">Acesse para cadastrar alunos, montar treinos e acompanhar progresso.</span>
      </div>

      <label for="loginEmail">E-mail</label>
      <input id="loginEmail" type="email" placeholder="professor@teste.com"/>

      <label for="loginSenha">Senha</label>
      <input id="loginSenha" type="password" placeholder="123456"/>

      <button class="primary-btn" onclick="login()">Entrar como professor</button>

      <div class="demo-box">
        <strong>Teste rápido</strong>
        <p id="demoLogin">Professor: professor@teste.com / 123456</p>
      </div>
    </section>

    <div id="msg" class="msg"></div>
  </main>
  <script src="js/config.js"></script>
  <script src="js/database.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
