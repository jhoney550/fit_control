<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aluno - FitControl</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="app-body student-mode">
  <div class="drawer-backdrop" onclick="fecharMenu()"></div>

  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="brand-icon small">FC</div>
      <div><strong>FitControl</strong><span id="drawerAlunoNome">Aluno</span></div>
      <button class="drawer-close" onclick="fecharMenu()">×</button>
    </div>

    <nav class="drawer-nav">
      <button class="drawer-link active" data-page="hoje">Treino de hoje</button>
      <button class="drawer-link" data-page="semana">Minha semana</button>
      <button class="drawer-link" data-page="historico">Histórico</button>
      <button class="drawer-link" data-page="perfil">Perfil</button>
    </nav>

    <button class="logout-btn" onclick="sair()">Sair</button>
  </aside>

  <header class="app-topbar">
    <button class="menu-btn" onclick="abrirMenu()">☰</button>
    <div><strong>FitControl</strong><span id="alunoNomeTopo">Aluno</span></div>
    <button class="ghost-btn compact" onclick="sair()">Sair</button>
  </header>

  <main class="app-main student-main">
    <section class="page active" id="page-hoje">
      <div class="hero"><h1>Treino de hoje</h1><p id="subtituloTreino">Carregando...</p></div>
      <section class="card progress-card">
        <div class="progress-info"><strong id="progressoTexto">0 de 0 exercícios</strong><span id="progressoPercentual">0%</span></div>
        <div class="progress-bar"><div id="progressoBarra"></div></div>
      </section>
      <section class="card"><div id="treinoHoje" class="exercise-list"></div></section>
    </section>

    <section class="page" id="page-semana">
      <div class="hero"><h1>Minha semana</h1><p>Veja seus treinos semanais.</p></div>
      <section class="card"><div id="semanaAluno" class="week-list"></div></section>
    </section>

    <section class="page" id="page-historico">
      <div class="hero"><h1>Histórico</h1><p>Exercícios concluídos.</p></div>
      <section class="card"><div id="historicoAluno" class="list"></div></section>
    </section>

    <section class="page" id="page-perfil">
      <div class="hero"><h1>Perfil</h1><p>Seus dados.</p></div>
      <section class="card">
        <div class="profile-card">
          <div class="avatar-preview" id="alunoAvatarPreview">A</div>
          <div class="form-grid">
            <input id="alunoPerfilNome" placeholder="Nome"/>
            <input id="alunoPerfilEmail" type="email" placeholder="E-mail"/>
            <input id="alunoPerfilSenha" type="password" placeholder="Nova senha"/>
            <input id="alunoPerfilWhatsapp" placeholder="WhatsApp"/>
            <input id="alunoPerfilPeso" type="number" placeholder="Peso kg"/>
            <input id="alunoPerfilAltura" type="number" placeholder="Altura cm"/>
          </div>
        </div>
        <button class="primary-btn inline" onclick="salvarPerfilAluno()">Salvar perfil</button>
      </section>
    </section>

    <div id="msg" class="msg fixed-msg"></div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/database.js"></script>
  <script src="js/aluno.js"></script>
</body>
</html>
