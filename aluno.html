<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aluno - FitControl</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="student-body">
  <header class="student-top">
    <div>
      <strong>FitControl</strong>
      <span id="alunoNomeTopo">Aluno</span>
    </div>
    <button class="ghost-btn compact" onclick="sair()">Sair</button>
  </header>

  <main class="student-main">
    <section class="student-page active" id="student-hoje">
      <section class="hero compact-hero">
        <h1>Treino de hoje</h1>
        <p id="subtituloTreino">Carregando...</p>
      </section>

      <section class="card progress-card">
        <div class="progress-info">
          <strong id="progressoTexto">0 de 0 exercícios</strong>
          <span id="progressoPercentual">0%</span>
        </div>
        <div class="progress-bar">
          <div id="progressoBarra"></div>
        </div>
      </section>

      <section class="card">
        <div id="treinoHoje" class="exercise-list"></div>
      </section>
    </section>

    <section class="student-page" id="student-semana">
      <section class="hero compact-hero">
        <h1>Minha semana</h1>
        <p>Veja a divisão semanal definida pelo professor.</p>
      </section>

      <section class="card">
        <div id="semanaAluno" class="week-list"></div>
      </section>
    </section>

    <section class="student-page" id="student-historico">
      <section class="hero compact-hero">
        <h1>Histórico</h1>
        <p>Resumo local dos exercícios marcados como feitos.</p>
      </section>

      <section class="card">
        <div id="historicoAluno" class="list"></div>
      </section>
    </section>

    <section class="student-page" id="student-perfil">
      <section class="hero compact-hero">
        <h1>Perfil</h1>
        <p>Seus dados cadastrados pelo professor.</p>
      </section>

      <section class="card">
        <div class="profile-card">
          <div class="avatar-preview" id="alunoAvatarPreview">A</div>
          <div class="form-grid one-col-mobile">
            <input id="alunoPerfilNome" placeholder="Nome"/>
            <input id="alunoPerfilEmail" type="email" placeholder="E-mail"/>
            <input id="alunoPerfilSenha" type="password" placeholder="Nova senha"/>
            <input id="alunoPerfilWhatsapp" placeholder="WhatsApp"/>
            <input id="alunoPerfilPeso" type="number" placeholder="Peso kg"/>
            <input id="alunoPerfilAltura" type="number" placeholder="Altura cm"/>
          </div>
        </div>
        <button class="primary-btn inline" onclick="salvarPerfilAluno()">Salvar perfil</button>
      </section>
    </section>

    <div id="msg" class="msg fixed-msg"></div>
  </main>

  <nav class="bottom-nav">
    <button class="bottom-link active" data-student-page="hoje">Hoje</button>
    <button class="bottom-link" data-student-page="semana">Semana</button>
    <button class="bottom-link" data-student-page="historico">Histórico</button>
    <button class="bottom-link" data-student-page="perfil">Perfil</button>
  </nav>

  <script src="js/config.js"></script>
  <script src="js/database.js"></script>
  <script src="js/aluno.js"></script>
</body>
</html>
